<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Braindump</title>
<style>
  :root {
    --purple: #7c3aed;
    --purple-light: #a78bfa;
    --lime: #a3e635;
    --lime-light: #d9f99d;
    --glass-bg: rgba(24, 20, 36, 0.55);
    --glass-bg-strong: rgba(24, 20, 36, 0.78);
    --glass-border: rgba(255, 255, 255, 0.14);
    --text-primary: rgba(255, 255, 255, 0.95);
    --text-secondary: rgba(255, 255, 255, 0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    user-select: none;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: linear-gradient(155deg, rgba(124, 58, 237, 0.22), rgba(24, 20, 36, 0.65) 40%, rgba(163, 230, 53, 0.10));
    background-color: var(--glass-bg);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  /* ---------- Header ---------- */

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px 16px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  #title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.2px;
  }

  #title .brain-emoji {
    font-size: 15px;
    filter: drop-shadow(0 0 6px rgba(163, 230, 53, 0.5));
  }

  #header-controls {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }

  .win-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
    transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
    line-height: 1;
  }

  .win-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    color: var(--text-primary);
    transform: scale(1.08);
  }

  #close-btn:hover {
    background: rgba(248, 113, 113, 0.85);
    color: white;
  }

  /* ---------- Body ---------- */

  #body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 16px 14px 16px;
    min-height: 0;
    gap: 10px;
  }

  #edit-banner {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--lime-light);
    padding: 0 2px;
    -webkit-app-region: no-drag;
  }

  #edit-banner.visible { display: flex; }

  #edit-banner .edit-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lime);
    box-shadow: 0 0 6px var(--lime);
    flex-shrink: 0;
  }

  #edit-banner-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #note-textarea {
    width: 100%;
    flex: 0 0 auto;
    height: 120px;
    resize: none;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.18);
    color: var(--text-primary);
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.5;
    font-family: inherit;
    outline: none;
    user-select: text;
    -webkit-app-region: no-drag;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  #note-textarea.editing {
    border-color: var(--lime);
    box-shadow: 0 0 0 3px rgba(163, 230, 53, 0.2);
  }

  #note-textarea::placeholder {
    color: var(--text-secondary);
  }

  #note-textarea:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.25);
  }

  #action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  #action-buttons {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
  }

  #save-btn {
    flex: 0 0 auto;
    border: none;
    border-radius: 10px;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 700;
    color: #1a1625;
    background: linear-gradient(120deg, var(--lime), var(--lime-light));
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(163, 230, 53, 0.3);
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }

  #save-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(163, 230, 53, 0.42);
  }

  #save-btn:active {
    transform: translateY(0);
  }

  #new-note-btn {
    flex: 0 0 auto;
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.06);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  #new-note-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--purple-light);
  }

  #new-note-btn:active {
    transform: translateY(0);
  }

  #save-status {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 5px;
    flex: 1;
    justify-content: flex-end;
  }

  #save-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lime);
    opacity: 0;
    box-shadow: 0 0 8px var(--lime);
    transition: opacity 0.2s ease;
  }

  #save-status.active .dot { opacity: 1; }
  #save-status.saving .dot { background: var(--purple-light); box-shadow: 0 0 8px var(--purple-light); opacity: 1; }

  /* ---------- Recent notes ---------- */

  #recent-section {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #recent-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
    padding-left: 2px;
  }

  #recent-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    -webkit-app-region: no-drag;
    padding-right: 2px;
  }

  #recent-list::-webkit-scrollbar { width: 5px; }
  #recent-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 4px;
  }
  #recent-list::-webkit-scrollbar-track { background: transparent; }

  .note-item {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 7px 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .note-item:hover {
    background: rgba(255, 255, 255, 0.09);
    border-color: rgba(124, 58, 237, 0.4);
  }

  .note-item.editing {
    background: rgba(163, 230, 53, 0.1);
    border-color: rgba(163, 230, 53, 0.55);
  }

  .note-item .note-text {
    font-size: 12px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .note-item .note-meta {
    margin-top: 2px;
    font-size: 10px;
    color: var(--text-secondary);
  }

  .note-item.new-note {
    animation: pop-in 0.4s ease;
    border-color: rgba(163, 230, 53, 0.45);
  }

  @keyframes pop-in {
    0% { opacity: 0; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  #recent-empty {
    font-size: 11.5px;
    color: var(--text-secondary);
    padding: 8px 2px;
    font-style: italic;
  }

  /* ---------- Bubble (minimized) state ---------- */

  #bubble {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    -webkit-app-region: drag;
    cursor: pointer;
  }

  #bubble-inner {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--purple), #5b21b6);
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 24px rgba(124, 58, 237, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    -webkit-app-region: no-drag;
    transition: transform 0.12s ease;
  }

  #bubble-inner:hover { transform: scale(1.08); }
  #bubble-inner:active { transform: scale(0.96); }

  body.bubble-mode #app { display: none; }
  body.bubble-mode #bubble { display: flex; }
  body.bubble-mode #app-shell { background: transparent; box-shadow: none; border: none; }
</style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="title"><span class="brain-emoji">🧠</span><span>Braindump</span></div>
      <div id="header-controls">
        <div class="win-btn" id="minimize-btn" title="Minimize to bubble">–</div>
        <div class="win-btn" id="close-btn" title="Hide">✕</div>
      </div>
    </div>

    <div id="body">
      <div id="edit-banner"><span class="edit-dot"></span><span id="edit-banner-text">Editing note</span></div>

      <textarea id="note-textarea" placeholder="Dump a thought…"></textarea>

      <div id="action-row">
        <div id="action-buttons">
          <button id="save-btn">Save</button>
          <button id="new-note-btn" title="Start a new note">New note</button>
        </div>
        <div id="save-status"><span class="dot"></span><span id="save-status-text">Idle</span></div>
      </div>

      <div id="recent-section">
        <div id="recent-label">Recent</div>
        <div id="recent-list">
          <div id="recent-empty">No notes yet. Start typing above.</div>
        </div>
      </div>
    </div>
  </div>

  <div id="bubble">
    <div id="bubble-inner">🧠</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
